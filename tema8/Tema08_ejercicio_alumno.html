<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ejercicios – Tema 8 con Bootstrap 5</title>
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		.card+.card {
			margin-top: 1rem
		}
	</style>
</head>

<body class="bg-light">
	<div class="container pgit 
			<h1 class=" mb-4">Ejercicios - Tema 8: Validación de formularios</h1>
		<p class="text-muted">Se mantiene el patrón de validación con <code>addEventListener('submit', …)</code> y
			validación HTML5 donde corresponde.</p>
		<!-- EJ1 -->
		<div class="card">
			<div class="card-header">Ejercicio 1 – JS básico</div>
			<div class="card-body">
				<form id="bs-form-ej1" class="row g-3" novalidate>
					<div class="col-md-6">
						<label for="usuario" class="form-label">Usuario</label>
						<input class="form-control" type="text" name="usuario">
					</div>
					<div class="col-md-6">
						<label for="clave" class="form-label">Contraseña</label>
						<input class="form-control" type="password" name="clave">
					</div>
					<div class="col-12">
						<button class="btn btn-primary" type="submit">Enviar</button>
					</div>
				</form>
				<div id="bs-msg-ej1" class="mt-2"></div>
			</div>
		</div>
		<!-- EJ2 -->
		<div class="card mt-4">
			<div class="card-header">Ejercicio 2 – Validación HTML5</div>
			<div class="card-body">
				<form id="bs-form-ej2" class="row g-3">
					<div class="col-md-6">
						<label for="email" class="form-label">Correo electrónico</label>
						<input class="form-control" type="email" name="email" required>
					</div>
					<div class="col-md-6">
						<label for="edad" class="form-label">Edad</label>
						<input class="form-control" type="number" min="18" max="120" name="edad" required>
					</div>
					<div class="col-md-6">
						<label for="contraseña" class="form-label">Contraseña</label>
						<input class="form-control" type="password" id="contraseña" minlength="6" name="contraseña"
							required>
					</div>
					<div class="col-12">
						<button class="btn btn-primary" type="submit">Enviar</button>
					</div>
					<div id="bs-msg-ej2" class="mt-2"></div>
				</form>

			</div>
			<!-- EJ3 -->
			<div class="card">
				<div class="card-header">Ejercicio 3 – Validación combinada</div>
				<div class="card-body">
					<form id="bs-form-ej3" class="row g-3" novalidate>
						<div class="col-md-6">
							<label for="nombre" class="form-label">Nombre</label>
							<input class="form-control" type="text" pattern="[A-Za-zÉÍÓÚáéíóúÑñ\- ]+"
								title="El formato permitido son solo letras sin numeros  el espacio, el - y la / tambien se permiten"
								name="nombre" required>
						</div>
						<div class="col-md-6">
							<label for="apellido" class="form-label">Apellido</label>
							<input class="form-control" type="text" pattern="[A-Za-zÉÍÓÚáéíóúÑñ\- ]+"
								title="El formato permitido son solo letras sin numeros, el espacio, el - y la / tambien se permiten"
								name="apellido" required>
						</div>

						<div class="col-12">
							<button class="btn btn-primary" type="submit">Enviar</button>
						</div>
						<div id="mensaje-validacion" class="mt-2"></div>
					</form>
				</div>
				<!--Ej4-->
				<div class="card">
				<div class="card-header">Ejercicio 4</div>
				<div class="card-body">
					<form id="bs-form-ej4">
						<div class="col-md-6">
							<label for="contraseña" class="form-label">Contraseña</label>
							<input class="form-control" type="password" minlength="6" name="contraseña" required>
						</div>
						<div class="col-md-6">
							<label for="confirmar contraseña" class="form-label">confirmar contraseña</label>
							<input class="form-control" type="password" minlength="6" name="confirmarContraseña" required>
						</div>
						<div class="col-12">
							<button class="btn btn-primary" type="submit">Registrar</button>
						</div>
					</form>
					<div id="msg-respuesta" class="mt-2"></div>
					
				</div>
				</div>
				<!--Ej5-->
				<div class="card">
					<div class="card-header">Ejercicio5</div>
					<div class="card-body">
						<form id="bs-form-ej5" >
							<div class="mb-3">
								<label for = "nombreyApellidos" class="form-label">Nombre y apellidos</label>
								<input class="form-control" type="text" pattern="[A-Za-zÉÍÓÚáéíóúÑñ\- ]+" name="nombreyApellidos" required>
								<label for="email" class="form-label">Email</label>
								<input class="form-control" type="email" name="email" required>
								<label for="edad" class="form-label">Edad</label>
								<input class="form-control" type="number" min="16" max="120" name="edad" required>
								<label for="contraseña" class="form-label">Contraseña</label>
								<input class="form-control" type="password" minlength="6" name="contraseña" required>
								<label for="repetirContraseña" class="form-label">Repetir contraseña</label>
								<input class="form-control" type="password" minlength="6" name="repetirContraseña" required>
								<div class="form-check mt-2">
									<input class="form-check-input" type="checkbox" name="terminos" required>
									<label class="form-check-label" for="terminos">Acepto los términos</label>	
							
							</div>
							<button type="submit" class="btn btn-primary">Enviar</button>
						</form>
						<div id="msg-ej5" class="mt-2"></div>
					</div>
				</div>


				<!-- Bootstrap 5 JS (bundle con Popper) -->
				<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
					integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
					crossorigin="anonymous"></script>
				<script>
					// TODO: Aquí va el código de validación 


					document.getElementById('bs-form-ej1').addEventListener('submit', function (e) {
						e.preventDefault();

						const usuario = this.usuario.value.trim();
						const clave = this.clave.value.trim();
						if (usuario === '' || clave === '') {
							alert('Por favor, rellena todos los campos.');
							return;
						}
						this.submit();
					});
					
					
					 // Evita el envío del formulario
						document.getElementById('bs-form-ej3').addEventListener('submit', function (e) {
						e.preventDefault();
						const form = e.target; // referencia al formulario
						const mensaje = document.getElementById('mensaje-validacion');

						if (form.checkValidity()) {
							// Si todos los campos son válidos
							mensaje.innerHTML = `<div class="alert alert-success">Formulario válido. Enviado correctamente.</div>`;
							form.reset(); // Limpia el formulario
						} else {
							// Si hay errores de validación
							form.reportValidity(); // Muestra mensajes de error nativos
							mensaje.innerHTML = `<div class="alert alert-danger">Corrige los errores antes de enviar.</div>`;
						}
					});
					document.getElementById('bs-form-ej4').addEventListener('submit', function (e) {
						e.preventDefault();

						const contrasena = this.contraseña.value.trim();
						const repetirContrasena = this.confirmarContraseña.value.trim();
						const msg= document.getElementById('msg-respuesta');
						
						if(contrasena === repetirContrasena){
							msg.innerHTML ='<div class= "alert alert-success">Formulario enviado con exito</div>';

						}else{
							msg.innerHTML='<div class= "alert alert-danger">Hay algun error en su formulario</div>';
							return;
						}
					});
					document.getElementById('bs-form-ej5').addEventListener('submit', function (e) {
						e.preventDefault();	
						const contraseña = this.contraseña.value.trim();
						const repetirContraseña = this.repetirContraseña.value.trim();
						const msgEj5 = document.getElementById('msg-ej5');
						// Validaciones
						if (contraseña !== repetirContraseña) {
							msgEj5.innerHTML = '<div class="alert alert-danger">Las contraseñas no coinciden.</div>';
							return;
						}
						msgEj5.innerHTML = '<div class="alert alert-success">Formulario enviado con éxito.</div>';
						const datos ={
							nombreyApellidos: this.nombreyApellidos.value,
							email: this.email.value,
							edad: this.edad.value,
							contraseña: this.contraseña.value,
							terminos: this.terminos.checked
						}
						document.getElementById("msg-ej5").innerHTML += `${JSON.stringify(datos)}`;
					});
					
				</script>

</body>

</html>
